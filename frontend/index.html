<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Market Dashboard</title>

  <!-- Chart.js core -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- Time scale adapter -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <!-- Candlestick support -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>
  <!-- Hammer.js (pinch zoom) -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <!-- Zoom plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Market Dashboard</h1>
    <p class="subtitle">Live Cryptocurrency Prices</p>
  </header>

  <!-- Live price ticker -->
  <div id="priceBox">Loading price...</div>

  <!-- Asset selector (US-9) -->
  <div class="section-label">Compare Assets <span class="hint">(select up to 4)</span></div>
  <div id="assetSelector" class="asset-selector"></div>

  <!-- Chart controls -->
  <div class="chart-controls">
    <div class="chart-controls-left">
      <span class="chart-label">Candlestick / Comparison Chart</span>
      <!-- US-11: Indicator toggles -->
      <div id="indicatorToggles" class="indicator-toggles"></div>
    </div>
    <div class="chart-controls-right">
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomIn()"   title="Zoom In">+</button>
        <button class="zoom-btn" onclick="zoomOut()"  title="Zoom Out">−</button>
        <button class="zoom-btn reset" onclick="resetZoom()" title="Reset Zoom">↺</button>
      </div>
      <div id="tfSelector"></div>
    </div>
  </div>

  <!-- Main candlestick chart -->
  <div class="chart-wrapper">
    <canvas id="chart"></canvas>
  </div>

  <!-- US-11: RSI panel (hidden by default, shown when RSI toggled on) -->
  <div id="rsiWrapper" class="rsi-wrapper" style="display:none;">
    <div class="rsi-label">RSI (14)</div>
    <div class="rsi-chart-box">
      <canvas id="rsiChart"></canvas>
    </div>
  </div>

  <!-- Alert Panel (US-6) -->
  <div class="alert-panel">
    <div class="alert-col">
      <div class="section-label">Set Price Alert</div>
      <form id="alertForm" class="alert-form">
        <select id="alertSymbol" class="alert-input">
          <option value="BTCUSDT">BTC/USDT</option>
          <option value="ETHUSDT">ETH/USDT</option>
          <option value="BNBUSDT">BNB/USDT</option>
          <option value="SOLUSDT">SOL/USDT</option>
        </select>
        <select id="alertDirection" class="alert-input">
          <option value="above">▲ Price goes above</option>
          <option value="below">▼ Price goes below</option>
        </select>
        <input id="alertPrice" type="number" step="0.01"
               placeholder="Enter price (e.g. 70000)"
               class="alert-input" required />
        <button type="submit" class="alert-submit">Set Alert</button>
      </form>
      <div class="section-label" style="margin-top:1.25rem;">Active Alerts</div>
      <div id="alertList"></div>
    </div>
    <div class="alert-col">
      <div class="section-label">Alert History</div>
      <div id="alertHistory"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
